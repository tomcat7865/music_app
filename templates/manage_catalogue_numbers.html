{% extends "layout.html" %}

{% block content %}
<div style="margin-bottom: 20px;">
    <a href="/control_panel" style="color: #666; text-decoration: none; font-size: 0.9rem;">
        <i class="fas fa-arrow-left"></i> Back to Control Panel
    </a>
</div>

<div class="search-section">
    <h1 style="color: #eee; margin-top: 0;"><i class="fas fa-barcode" style="color: #444; margin-right: 10px;"></i> Catalogue Numbers</h1>
    <p style="color: #666;">Manage unique identification numbers for specific release versions.</p>

    <div class="details-grid" style="margin-top: 30px;">
        <div class="column">
            <div class="spec-box">
                <label class="detail-label">Existing Numbers</label>
                <select id="cat-dropdown" onchange="syncField()" style="margin-top: 10px;">
                    <option value="">-- Choose Number to Edit --</option>
                    {% for c in cat_nos %}
                    <option value="{{ c.id }}">{{ c.catalogue_number }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="column">
            <div class="spec-box">
                <form action="/control_panel/catalogue_numbers/save" method="POST">
                    <input type="hidden" id="cat_id" name="cat_id">
                    <label class="detail-label">Catalogue Number</label>
                    <input type="text" id="cat_val" name="cat_val" placeholder="e.g. CDP 7 46445 2" style="margin-top:10px;" required>
                    
                    <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: flex-end; align-items: center;">
                        <button type="button" onclick="clearForm()" class="clear-btn">Clear</button>
                        <button type="submit">Save Number</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function syncField() {
    const dropdown = document.getElementById('cat-dropdown');
    if(dropdown.value !== "") {
        document.getElementById('cat_id').value = dropdown.value;
        document.getElementById('cat_val').value = dropdown.options[dropdown.selectedIndex].text;
    } else {
        clearForm();
    }
}

function clearForm() {
    document.getElementById('cat-dropdown').value = "";
    document.getElementById('cat_id').value = "";
    document.getElementById('cat_val').value = "";
}
</script>
{% endblock %}
