{% extends "layout.html" %}
{% block content %}
<style>
    .suggestions-container { position: relative; }
    .suggestions-list {
        position: absolute; top: 100%; left: 0; width: 100%;
        background: #1e1e1e; border: 1px solid #333; border-top: none;
        max-height: 200px; overflow-y: auto; z-index: 1000; display: none;
        border-radius: 0 0 4px 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .suggestion-item { padding: 10px; cursor: pointer; color: #eee; border-bottom: 1px solid #222; }
    .suggestion-item:hover { background: #28a745; color: white; }
</style>

<div style="margin-bottom: 20px;">
    <a href="/control_panel" style="color: #666; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Control Panel</a>
</div>

<div class="search-section">
    <h1><i class="fas fa-history" style="color: #28a745;"></i> Log Media Interaction</h1>
    
    <form action="/control_panel/interactions/save" method="POST" autocomplete="off">
        <div class="details-grid">
            <div class="column">
                <div class="spec-box">
                    <label style="color: #666; font-size: 0.8rem; display: block; margin-bottom: 8px;">MASTER RELEASE ID</label>
                    <input type="number" name="master_id" id="master_id" required placeholder="e.g. 101" 
                           style="width:100%; padding:12px; background:#121212; border:1px solid #333; color:white; border-radius:4px;">
                    <div id="verify_box" style="margin-top: 10px; padding: 10px; border-radius: 4px; background: #1a1a1a; font-size: 0.9rem; color: #444; border: 1px dashed #333;">
                        Verify ID...
                    </div>
                </div>
            </div>

            <div class="column">
                <div class="spec-box suggestions-container">
                    <label style="color: #666; font-size: 0.8rem; display: block; margin-bottom: 8px;">CATALOGUE NUMBER</label>
                    <input type="text" id="cat_search" name="cat_number" required placeholder="Type to search..." 
                           style="width:100%; padding:12px; background:#121212; border:1px solid #333; color:white; border-radius:4px;">
                    <div id="cat_results" class="suggestions-list"></div>

                    <label style="color: #666; font-size: 0.8rem; display: block; margin-top: 20px; margin-bottom: 8px;">PHYSICAL FORMAT</label>
                    <select name="format_id" required style="width:100%; padding:12px; background:#121212; border:1px solid #333; color:white; border-radius:4px;">
                        {% for f in formats %}<option value="{{f.id}}">{{f.physical_format_type}}</option>{% endfor %}
                    </select>
                </div>
            </div>

            <div class="column">
                <div class="spec-box">
                    <label style="color: #666; font-size: 0.8rem; display: block; margin-bottom: 8px;">INTERACTION TYPE</label>
                    <select name="interaction_type" required style="width:100%; padding:12px; background:#121212; border:1px solid #333; color:white; border-radius:4px;">
                        {% for t in types %}<option value="{{t.id}}">{{t.interaction_type}}</option>{% endfor %}
                    </select>
                    
                    <label style="color: #666; font-size: 0.8rem; display: block; margin-top: 20px; margin-bottom: 8px;">DATE</label>
                    <input type="date" name="interaction_date" id="today_date" required style="width:100%; padding:12px; background:#121212; border:1px solid #333; color:white; border-radius:4px;">
                </div>
            </div>
        </div>
        <button type="submit" class="btn" style="width:100%; margin-top:20px; font-weight:bold; background:#28a745; padding: 20px;">
            <i class="fas fa-save"></i> RECORD INTERACTION
        </button>
    </form>
</div>

<script>
document.getElementById('today_date').valueAsDate = new Date();

// Master ID Verification
document.getElementById('master_id').addEventListener('input', function(e) {
    const val = e.target.value;
    const verifyBox = document.getElementById('verify_box');
    if (val.length >= 1) {
        fetch(`/api/verify_master/${val}`).then(res => res.json()).then(data => {
            if (data.success) {
                verifyBox.innerHTML = '<i class="fas fa-check" style="color: #28a745;"></i> ' + data.display;
                verifyBox.style.borderColor = "#28a745";
            } else {
                verifyBox.innerHTML = '<i class="fas fa-times" style="color: #dc3545;"></i> Invalid ID';
                verifyBox.style.borderColor = "#dc3545";
            }
        });
    }
});

// Catalogue Number Search (Custom)
const catSearch = document.getElementById('cat_search');
const catResults = document.getElementById('cat_results');
const catData = [ {% for c in cats %}"{{ c.catalogue_number }}", {% endfor %} ];

catSearch.addEventListener('input', function() {
    const val = this.value.toLowerCase();
    catResults.innerHTML = '';
    if (val.length < 1) { catResults.style.display = 'none'; return; }
    
    const matches = catData.filter(c => c.toLowerCase().includes(val));
    if (matches.length > 0) {
        matches.forEach(m => {
            const div = document.createElement('div');
            div.classList.add('suggestion-item');
            div.innerText = m;
            div.onclick = function() {
                catSearch.value = m;
                catResults.style.display = 'none';
            };
            catResults.appendChild(div);
        });
        catResults.style.display = 'block';
    } else {
        catResults.style.display = 'none';
    }
});

// Close list if clicked outside
document.addEventListener('click', function(e) {
    if (e.target !== catSearch) catResults.style.display = 'none';
});
</script>
{% endblock %}
