{% extends "layout.html" %}
{% block content %}
<style>
    /* 1. UNIFIED INPUT STYLE */
    input, select, textarea {
        -webkit-appearance: none;
        appearance: none;
        box-sizing: border-box !important;
        width: 100%;
        height: 40px;
        background: #222;
        color: #eee;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 0 10px;
        font-family: inherit;
        font-size: 0.9rem;
        display: block;
    }

    /* 2. CUSTOM SEARCH DROPDOWN (Strict Alignment) */
    .search-container {
        position: relative; 
        width: 100%;
        box-sizing: border-box; /* Keeps it inside the grey area */
    }

    #custom_cat_results {
        position: absolute;
        top: 100%; 
        left: 0;
        width: 100%;
        background: #2a2a2a;
        border: 1px solid #444;
        border-top: none;
        z-index: 999;
        max-height: 200px;
        overflow-y: auto;
        display: none; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .search-item {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #333;
        font-size: 0.85rem;
    }
    .search-item:hover { background: #333; color: #28a745; }

    /* 3. THE GRID (Vertical Sync) */
    .grid-container {
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 20px;
        /* Remove 'align-items: end' to keep labels and boxes naturally aligned */
    }

    label {
        color: #666;
        font-size: 0.7rem;
        display: block;
        margin-bottom: 8px;
        letter-spacing: 1px;
        height: 14px; /* Force identical label height for vertical sync */
    }

    #album_display {
        height: 40px;
        background: #1a1a1a;
        color: #888;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0 10px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        font-size: 0.9rem;
    }
</style>

<div style="margin-bottom: 20px;">
    <a href="/control_panel" style="color: #666; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Control Panel</a>
</div>

<div class="search-section">
    <h2 style="color: #28a745; margin-bottom: 20px; letter-spacing: 2px; font-size: 1.2rem;">LOG MEDIA INTERACTION</h2>
    
    <form action="{{ url_for('save_interaction') }}" method="post" autocomplete="off">
        <div class="grid-container">
            
            <div>
                <label>MASTER RELEASE ID / DATE</label>
                <div style="display: flex; gap: 20px;">
                    <div style="flex: 1;"><input type="number" name="master_id" id="master_id" required></div>
                    <div style="flex: 1;"><input type="date" name="interaction_date" id="interaction_date" required></div>
                </div>
            </div>

            <div>
                <label style="color: #28a745;">CORRESPONDING ALBUM</label>
                <div id="album_display">Enter ID to look up...</div>
            </div>

            <div>
                <label>INTERACTION TYPE</label>
                <select name="interaction_type" required>
                    {% for t in types %}
                    <option value="{{ t.id }}">{{ t.interaction_type }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="search-container">
                <label>CATALOGUE #</label>
                <input type="text" name="cat_number" id="cat_input" placeholder="Start typing...">
                <div id="custom_cat_results"></div>
            </div>

            <div>
                <label>PHYSICAL FORMAT</label>
                <select name="format_id">
                    {% for f in formats %}
                    <option value="{{ f.id }}">{{ f.physical_format_type }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label>BIT DEPTH / SAMPLE RATE</label>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <select name="bit_id">
                            <option value="">N/A</option>
                            {% for b in bits %}<option value="{{ b.id }}">{{ b.bit_depth }}</option>{% endfor %}
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <select name="sample_id">
                            <option value="">N/A</option>
                            {% for s in rates %}<option value="{{ s.id }}">{{ s.sample_rate }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <label>INDIVIDUAL COMMENT</label>
            <textarea name="comment" style="height: 80px; padding: 10px; width: 100%;"></textarea>
        </div>

        <button type="submit" class="btn" style="margin-top: 20px; width: 100%; padding: 15px;">SAVE INTERACTION</button>
    </form>
</div>

<script>
const allCats = [{% for c in cats %}"{{ c.catalogue_number }}",{% endfor %}];
const catInput = document.getElementById('cat_input');
const catResults = document.getElementById('custom_cat_results');

catInput.addEventListener('input', function() {
    const val = this.value.toLowerCase();
    catResults.innerHTML = '';
    if (val.length < 1) { catResults.style.display = 'none'; return; }
    const filtered = allCats.filter(c => c.toLowerCase().includes(val)).slice(0, 10);
    if (filtered.length > 0) {
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.classList.add('search-item');
            div.innerText = item;
            div.onclick = function() {
                catInput.value = item;
                catResults.style.display = 'none';
            };
            catResults.appendChild(div);
        });
        catResults.style.display = 'block';
    } else { catResults.style.display = 'none'; }
});

document.addEventListener('click', (e) => {
    if (!catInput.contains(e.target)) catResults.style.display = 'none';
});

document.getElementById('master_id').addEventListener('input', function() {
    const mid = this.value;
    const display = document.getElementById('album_display');
    if (mid.length > 0) {
        fetch(`/api/get_album_name?id=${mid}`)
            .then(response => response.json())
            .then(data => {
                display.innerText = data.album;
                display.style.color = (data.album === 'ID NOT FOUND') ? '#d9534f' : '#28a745';
            });
    } else {
        display.innerText = 'Enter ID to look up...';
        display.style.color = '#888';
    }
});

window.addEventListener('load', () => {
    document.getElementById('interaction_date').value = new Date().toISOString().split('T')[0];
});
</script>
{% endblock %}
